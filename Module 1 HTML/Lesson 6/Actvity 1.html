<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M1 L6 Doctor's appoinment</title>
</head>
<body>
    <h1>Apollo Hospital - Doctor's Appoinment Form</h1>
    <p>Fill in form given below</p>
<hr>

<form>
    <fieldset>
<legend>
    <h3>Personel Details</h3>
</legend>

    <label for="name">Your name:</label> <br>
    <input type="text" id="name" placeholder="Enter full name">
    
    <br><br>

<label for="patient-id">Patient ID:</label> <br>
<input type="password" id="patient-id" placeholder="Enter secret id">

<br><br>

<label for="DOB">date of birth:</label>
<input type="date" id="dob">
</fieldset>

<br>

<fieldset>

<legend>Your Visit</legend>

<label for="doctor">Choose Your Doctor</label> <br>
<select id="doctor">
<option value="">Select a doctor</option>
<option value="dr-ray">Dr. Ray - General</option>
<option value="dr-lee">Dr. lee - Liver</option>
</select>

<br><br>

<label for="notes">Any Notes?</label> <br>
<textarea id="notes" rows="3" cols="35" placeholde="Eg: I have a sore throat"></textarea>

<br>








<fieldset></fieldset>
<legend>preffered visit day</legend>

<input type="checkbox" name="day"> Monday<br>
<input type="checkbox" name="day"> Wednesday<br>
<input type="checkbox" name="day"> Friday<br>

<br><br>

<label>Why are you visiting?</label>
<input type="radio" name="reason"> Fever <br> 
<input type="radio" name="reason">cold <br>
<input type="radio" name="reason">headache <br>
</fieldset>

<input type="submit" value="Book  appoinment">

</fieldset>

</form>
</body>
</html>
